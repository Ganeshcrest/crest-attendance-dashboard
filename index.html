<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crest Property — Ops Accountability Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ed;color:#1a1a18;font-size:13px;line-height:1.5}
.topbar{background:#1a1a18;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.topbar-left h1{font-size:15px;font-weight:600}
.topbar-left p{font-size:11px;color:#888780;margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-pill{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #444;background:transparent;color:#ccc;transition:all .15s}
.nav-pill.active{background:#fff;color:#1a1a18;border-color:#fff;font-weight:600}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#9FE1CB;font-weight:500}
.live-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #444;background:transparent;color:#ccc}
.view{display:none;padding:20px 24px}.view.active{display:block}
.update-bar{background:#EAF3DE;border-radius:8px;padding:8px 14px;font-size:12px;color:#3B6D11;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.scorecards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.sc{background:#fff;border-radius:10px;padding:14px 16px;border-top:4px solid transparent;cursor:pointer;transition:transform .12s,box-shadow .12s}
.sc:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.09)}
.sc.selected{box-shadow:0 0 0 2px #1a1a18;transform:translateY(-2px)}
.sc .rank{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#73726c;margin-bottom:3px}
.sc .sc-name{font-size:14px;font-weight:700;margin-bottom:8px}
.sc .big{font-size:28px;font-weight:800;line-height:1}
.sc .meta{font-size:11px;color:#73726c;margin-top:4px}
.sc .site-pills{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.sc .sp{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.ops-panel{display:none}.ops-panel.active{display:block}
.panel-header{background:#fff;border-radius:12px;padding:18px 22px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ph-name{font-size:22px;font-weight:800;margin-bottom:3px}
.ph-sub{font-size:12px;color:#73726c}
.ph-stats{display:flex;gap:24px;flex-wrap:wrap}
.ph-stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#73726c}
.ph-stat .val{font-size:20px;font-weight:800}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:0}
.card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#73726c;margin-bottom:12px}
.cw{position:relative;width:100%;height:200px}
.action-blocks{display:grid;gap:10px;margin-bottom:14px}
.ab{border-radius:10px;padding:16px 18px;border-left:4px solid transparent}
.ab-zero{background:#FFF0F0;border-color:#791F1F}
.ab-critical{background:#FFF5F5;border-color:#E24B4A}
.ab-warning{background:#FFFBF2;border-color:#EF9F27}
.ab-watch{background:#FFFFF2;border-color:#F9CB42}
.ab-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ab-title{font-weight:700;font-size:13px}
.ab-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px}
.ab-zero .ab-count{background:#F7C1C1;color:#791F1F}
.ab-critical .ab-count{background:#FCEBEB;color:#A32D2D}
.ab-warning .ab-count{background:#FAEEDA;color:#854F0B}
.ab-watch .ab-count{background:#FFF9E6;color:#633806}
.action-list{list-style:none;font-size:12px;color:#333;margin-bottom:10px}
.action-list li{padding:3px 0;display:flex;gap:7px;align-items:baseline}
.action-list li::before{content:"→";font-weight:700;flex-shrink:0;color:#888}
.site-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500;display:flex;align-items:center;gap:6px;line-height:1.3}
.chip-zero{background:#F7C1C1;color:#791F1F}
.chip-critical{background:#FCEBEB;color:#A32D2D}
.chip-warning{background:#FAEEDA;color:#854F0B}
.chip-watch{background:#FFF9E6;color:#633806}
.chip-pct{font-weight:800}
.site-tbl{width:100%;border-collapse:collapse;font-size:12px}
.site-tbl th{padding:7px 10px;border-bottom:1px solid #e5e4dd;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#73726c;text-align:left;background:#fafaf8;white-space:nowrap}
.site-tbl td{padding:8px 10px;border-bottom:1px solid #f1efe8;vertical-align:middle}
.site-tbl tr:last-child td{border-bottom:none}
.site-tbl tr:hover td{background:#fafaf8}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;white-space:nowrap}
.bz{background:#F7C1C1;color:#791F1F}.bc{background:#FCEBEB;color:#A32D2D}.bw{background:#FAEEDA;color:#854F0B}.bwt{background:#FFF9E6;color:#633806}.bg{background:#EAF3DE;color:#3B6D11}
.bar-w{display:flex;align-items:center;gap:6px}
.bar{flex:1;height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;min-width:40px}
.bar-f{height:100%;border-radius:3px}
.league-row{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:10px;display:grid;grid-template-columns:36px 1fr auto;gap:14px;align-items:center;cursor:pointer;transition:transform .1s,box-shadow .1s}
.league-row:hover{transform:translateX(3px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lr-rank{font-size:20px;font-weight:800;color:#d3d1c7}
.lr-name{font-size:15px;font-weight:700}
.lr-meta{font-size:11px;color:#73726c;margin-top:2px}
.lr-bar-row{display:flex;gap:3px;margin-top:8px;height:7px;border-radius:4px;overflow:hidden}
.lr-seg{height:100%}
.lr-pct{font-size:24px;font-weight:800;text-align:right}
.lr-sub{font-size:10px;color:#73726c;text-align:right;margin-top:2px}
.compare-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.cg{background:#fff;border-radius:10px;padding:14px}
.cg-name{font-size:12px;font-weight:700;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-big{font-size:26px;font-weight:800;margin-bottom:4px}
.cg-bar{height:5px;border-radius:3px;background:#f1efe8;margin-bottom:10px;overflow:hidden}
.cg-fill{height:100%;border-radius:3px}
.cg-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cg-b{font-size:10px;padding:3px 5px;border-radius:4px;text-align:center;font-weight:700}
.tw{overflow-x:auto}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-hdr h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#73726c}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #e5e4dd;border-top-color:#1a73e8;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.scorecards,.compare-grid{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
</style>

var ACTIONS = {
  zero:     {label:'Zero attendance — immediate escalation',cls:'zero',color:'#791F1F',steps:['Call site supervisor immediately','Confirm if site is operational','Document reason and escalate','Update system with reason code']},
  critical: {label:'Critical — below 65%',cls:'critical',color:'#A32D2D',steps:['Escalate to site manager & HR today','Mandatory daily check-in call','Root cause analysis within 24 hours','Corrective action plan required']},
  warning:  {label:'Warning — 65% to 75%',cls:'warning',color:'#854F0B',steps:['Notify site manager in writing','Bi-daily attendance review for 7 days','Issue warning notice to supervisor','Corrective action plan within 48 hours']},
  watch:    {label:'Watch — 75% to 85%',cls:'watch',color:'#633806',steps:['Flag to site supervisor — target 85%+','Weekly review for next 2 weeks','Monitor daily — escalate if drops below 75%']}
};

function gc(p){if(p===0)return'#791F1F';if(p<65)return'#E24B4A';if(p<75)return'#EF9F27';if(p<85)return'#F9CB42';return'#639922';}
function gst(p){return p===0?'zero':p<65?'critical':p<75?'warning':p<85?'watch':'good';}
function bl(s){return{zero:'bz',critical:'bc',warning:'bw',watch:'bwt',good:'bg'}[s]||'bg';}
function sl(s){return{zero:'Zero',critical:'Critical',warning:'Warning',watch:'Watch',good:'Good'}[s]||s;}

var chartInst = {};
var liveData = null;
var activeOps = 'Deepak';

function getOps(siteName) {
  if (SITE_OPS_MAP[siteName]) return SITE_OPS_MAP[siteName];
  var lower = siteName.toLowerCase();
  for (var k in SITE_OPS_MAP) {
    if (k.toLowerCase() === lower) return SITE_OPS_MAP[k];
  }
  return '';
}

function loadData() {
  document.getElementById('screen-loading').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';

  fetch(WEB_APP_URL + '?_t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(kv) {
      var data = {
        report_date:     kv['report_date'] || '',
        overall_pct:     parseFloat(kv['overall_pct']) || 0,
        overall_present: parseInt(kv['overall_present']) || 0,
        overall_deploy:  parseInt(kv['overall_deploy']) || 0,
        ops: {}, sites: []
      };
      OPS_NAMES.forEach(function(n) {
        var p = 'ops_' + n.replace(/\s+/g,'_').toLowerCase();
        data.ops[n] = {
          pct:     parseFloat(kv[p+'_pct'])     || 0,
          present: parseInt(kv[p+'_present'])   || 0,
          deploy:  parseInt(kv[p+'_deploy'])    || 0
        };
      });
      var sd = kv['sites_data'] || '';
      if (sd) {
        sd.split('~').forEach(function(s) {
          var p = s.split('|');
          if (p.length >= 5) {
            var sn = p[0];
            data.sites.push({
              site: sn, present: parseInt(p[1])||0,
              deploy: parseInt(p[2])||0, pct: parseFloat(p[3])||0,
              cat: p[4], ops: getOps(sn)
            });
          }
        });
      }
      document.getElementById('screen-loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard(data);
    })
    .catch(function(e) {
      console.error('Error:', e);
      document.getElementById('screen-loading').innerHTML = '<p style="color:red">Error loading data. Please refresh.</p>';
    });
}

function renderDashboard(data) {
  liveData = data;
  var dt = data.report_date ? new Date(data.report_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}) : 'Today';
  var bar = '<div class="update-bar"><span>Report date: <b>' + dt + '</b> &nbsp;·&nbsp; Overall: <b style="color:' + gc(data.overall_pct) + '">' + data.overall_pct + '%</b> &nbsp;·&nbsp; ' + data.overall_present.toLocaleString() + ' / ' + data.overall_deploy.toLocaleString() + ' workers</span><span style="font-size:11px;color:#73726c">Auto-refreshes every ' + AUTO_REFRESH_MINUTES + ' min</span></div>';
  ['sc','lg','cp'].forEach(function(id){ var el=document.getElementById('update-bar-'+id); if(el) el.innerHTML=bar; });
  document.getElementById('topbar-sub').innerHTML = 'Report: ' + dt + ' &nbsp;·&nbsp; ' + data.sites.length + ' sites &nbsp;·&nbsp; live';
  buildScorecards(data);
}

function buildOpsPortfolio(data) {
  var port = {};
  OPS_NAMES.forEach(function(name) {
    var sites = data.sites.filter(function(s){ return s.ops === name; });
    var zero=0,crit=0,warn=0,watch=0,good=0;
    sites.forEach(function(s){
      var st=gst(s.pct);
      if(s.pct===0) zero++;
      else if(st==='critical') crit++;
      else if(st==='warning') warn++;
      else if(st==='watch') watch++;
      else good++;
    });
    var op = data.ops[name] || {};
    port[name] = {name:name,sites:sites,total_sites:sites.length,mtd_pct:op.pct||0,present:op.present||0,deploy:op.deploy||0,zero:zero,critical:crit,warning:warn,watch:watch,good:good};
  });
  return port;
}

function buildScorecards(data) {
  var port = buildOpsPortfolio(data);
  var sorted = OPS_NAMES.slice().sort(function(a,b){return port[b].mtd_pct-port[a].mtd_pct;});
  var ranks = ['1st','2nd','3rd','4th','5th'];
  document.getElementById('sc-row').innerHTML = sorted.map(function(name,i){
    var o = port[name];
    return '<div class="sc' + (name===activeOps?' selected':'') + '" onclick="selectOps(\'' + name + '\')" style="border-top-color:' + gc(o.mtd_pct) + '">' +
      '<div class="rank">' + ranks[i] + '</div>' +
      '<div class="sc-name">' + name + '</div>' +
      '<div class="big" style="color:' + gc(o.mtd_pct) + '">' + o.mtd_pct + '%</div>' +
      '<div class="meta">' + o.total_sites + ' sites &nbsp;·&nbsp; ' + o.present + '/' + o.deploy + '</div>' +
      '<div class="site-pills">' +
        (o.zero?'<span class="sp" style="background:#F7C1C1;color:#791F1F">' + o.zero + ' zero</span>':'') +
        (o.critical?'<span class="sp" style="background:#FCEBEB;color:#A32D2D">' + o.critical + ' critical</span>':'') +
        (o.warning?'<span class="sp" style="background:#FAEEDA;color:#854F0B">' + o.warning + ' warning</span>':'') +
        (o.watch?'<span class="sp" style="background:#FFF9E6;color:#633806">' + o.watch + ' watch</span>':'') +
        (!o.zero&&!o.critical&&!o.warning&&!o.watch?'<span class="sp" style="background:#EAF3DE;color:#3B6D11">All good</span>':'') +
      '</div></div>';
  }).join('');
  document.getElementById('ops-panels').innerHTML = sorted.map(function(name){ return buildPanel(name, port[name]); }).join('');
  selectOps(activeOps, false);
}

function buildPanel(name, o) {
  var zero  = o.sites.filter(function(s){return s.pct===0;});
  var crit  = o.sites.filter(function(s){return s.pct>0&&s.pct<65;});
  var warn  = o.sites.filter(function(s){return s.pct>=65&&s.pct<75;});
  var watch = o.sites.filter(function(s){return s.pct>=75&&s.pct<85;});
  var noAction = (zero.length+crit.length+warn.length+watch.length)===0;
  var key = name.replace(/\s/g,'_');

  function ab(k, sites) {
    if (!sites.length) return '';
    var info = ACTIONS[k];
    return '<div class="ab ab-' + k + '"><div class="ab-header"><div class="ab-title" style="color:' + info.color + '">' + info.label + '</div><span class="ab-count">' + sites.length + ' site' + (sites.length>1?'s':'') + '</span></div>' +
      '<ul class="action-list">' + info.steps.map(function(a){return'<li>'+a+'</li>';}).join('') + '</ul>' +
      '<div class="site-chips">' + sites.sort(function(a,b){return a.pct-b.pct;}).map(function(s){
        return '<span class="chip chip-' + k + '"><span class="chip-pct">' + s.pct + '%</span>' + s.site + '</span>';
      }).join('') + '</div></div>';
  }

  return '<div class="ops-panel" id="panel-' + key + '">' +
    '<div class="panel-header"><div><div class="ph-name">' + name + '</div><div class="ph-sub">Operations Manager &nbsp;·&nbsp; ' + o.total_sites + ' sites</div></div>' +
    '<div class="ph-stats"><div class="ph-stat"><div class="lbl">Attendance</div><div class="val" style="color:' + gc(o.mtd_pct) + '">' + o.mtd_pct + '%</div></div>' +
    '<div class="ph-stat"><div class="lbl">Present</div><div class="val">' + o.present + '</div></div>' +
    '<div class="ph-stat"><div class="lbl">Sites needing action</div><div class="val" style="color:' + (noAction?'#3B6D11':'#E24B4A') + '">' + (zero.length+crit.length+warn.length+watch.length) + '</div></div></div></div>' +
    '<div class="two-col"><div class="card"><h3>Site distribution — ' + name + '</h3><div class="cw"><canvas id="donut-' + key + '"></canvas></div></div>' +
    '<div class="card"><h3>Sites by status — ' + name + '</h3><div class="cw"><canvas id="bar-' + key + '"></canvas></div></div></div>' +
    '<div class="action-blocks">' + ab('zero',zero) + ab('critical',crit) + ab('warning',warn) + ab('watch',watch) +
    (noAction?'<div style="background:#EAF3DE;border-radius:10px;padding:18px;text-align:center;color:#3B6D11;font-size:14px;font-weight:700">All ' + o.total_sites + ' sites performing above 85% — no action required</div>':'') + '</div>' +
    '<div class="card"><h3>All ' + o.total_sites + ' sites — ' + name + '</h3><div class="tw"><table class="site-tbl"><thead><tr><th>#</th><th>Site name</th><th>Present</th><th>Deployment</th><th>Attendance %</th><th>Progress</th><th>Status</th></tr></thead><tbody>' +
    o.sites.slice().sort(function(a,b){return a.pct-b.pct;}).map(function(s,i){
      var st=gst(s.pct);
      return '<tr><td style="color:#73726c">'+(i+1)+'</td><td style="font-weight:500;max-width:240px;word-break:break-word">'+s.site+'</td><td style="text-align:right">'+s.present+'</td><td style="text-align:right">'+s.deploy+'</td><td style="font-weight:800;color:'+gc(s.pct)+';text-align:right">'+s.pct+'%</td><td><div class="bar-w"><div class="bar"><div class="bar-f" style="width:'+Math.min(s.pct,100)+'%;background:'+gc(s.pct)+'"></div></div></div></td><td><span class="badge '+bl(st)+'">'+sl(st)+'</span></td></tr>';
    }).join('') +
    '</tbody></table></div></div></div>';
}

function selectOps(name, doScroll) {
  activeOps = name;
  document.querySelectorAll('.sc').forEach(function(el){el.classList.remove('selected');});
  var port = buildOpsPortfolio(liveData);
  var sorted = OPS_NAMES.slice().sort(function(a,b){return port[b].mtd_pct-port[a].mtd_pct;});
  var idx = sorted.indexOf(name);
  var cards = document.querySelectorAll('.sc');
  if (cards[idx]) cards[idx].classList.add('selected');
  document.querySelectorAll('.ops-panel').forEach(function(p){p.classList.remove('active');});
  var panel = document.getElementById('panel-'+name.replace(/\s/g,'_'));
  if (panel) {
    panel.classList.add('active');
    buildPanelCharts(name, port[name]);
    if (doScroll !== false) panel.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function buildPanelCharts(name, o) {
  var key = name.replace(/\s/g,'_');
  var dId='donut-'+key, bId='bar-'+key;
  if(chartInst[dId])chartInst[dId].destroy();
  if(chartInst[bId])chartInst[bId].destroy();
  var zero=o.zero,crit=o.critical,warn=o.warning,watch=o.watch,good=o.good;
  chartInst[dId]=new Chart(document.getElementById(dId),{type:'doughnut',data:{labels:['Zero','Critical <65%','Warning 65-75%','Watch 75-85%','Good ≥85%'],datasets:[{data:[zero,crit,warn,watch,good],backgroundColor:['#791F1F','#E24B4A','#EF9F27','#F9CB42','#639922'],borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:8}}}}});
  var byStatus=[{label:'Zero',val:zero,color:'#791F1F'},{label:'Critical',val:crit,color:'#E24B4A'},{label:'Warning',val:warn,color:'#EF9F27'},{label:'Watch',val:watch,color:'#F9CB42'},{label:'Good',val:good,color:'#639922'}].filter(function(x){return x.val>0;});
  chartInst[bId]=new Chart(document.getElementById(bId),{type:'bar',data:{labels:byStatus.map(function(x){return x.label;}),datasets:[{data:byStatus.map(function(x){return x.val;}),backgroundColor:byStatus.map(function(x){return x.color;}),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

function buildLeague(data) {
  var port = buildOpsPortfolio(data);
  var sorted = OPS_NAMES.slice().sort(function(a,b){return port[b].mtd_pct-port[a].mtd_pct;});
  document.getElementById('league-rows').innerHTML = sorted.map(function(name,i){
    var o=port[name];
    function seg(n,c){return n?'<div class="lr-seg" style="flex:'+n+';background:'+c+'"></div>':'';}
    return '<div class="league-row" onclick="showView(\'scorecard\',null);setTimeout(function(){selectOps(\''+name+'\');},50)">' +
      '<div class="lr-rank">'+(i+1)+'</div><div><div class="lr-name">'+name+'</div><div class="lr-meta">'+o.total_sites+' sites &nbsp;·&nbsp; '+o.present+' / '+o.deploy+' workers</div>' +
      '<div class="lr-bar-row">'+seg(o.zero,'#791F1F')+seg(o.critical,'#E24B4A')+seg(o.warning,'#EF9F27')+seg(o.watch,'#F9CB42')+seg(o.good,'#639922')+'</div>' +
      '<div style="display:flex;gap:10px;margin-top:4px;font-size:10px">' +
        (o.zero?'<span style="color:#791F1F;font-weight:700">'+o.zero+' zero</span>':'') +
        (o.critical?'<span style="color:#A32D2D;font-weight:700">'+o.critical+' critical</span>':'') +
        (o.warning?'<span style="color:#854F0B;font-weight:700">'+o.warning+' warning</span>':'') +
        (o.watch?'<span style="color:#633806;font-weight:700">'+o.watch+' watch</span>':'') +
        '<span style="color:#3B6D11;font-weight:700">'+o.good+' good</span></div></div>' +
      '<div><div class="lr-pct" style="color:'+gc(o.mtd_pct)+'">'+o.mtd_pct+'%</div><div class="lr-sub">attendance</div></div></div>';
  }).join('');
  if(chartInst['all-trend'])chartInst['all-trend'].destroy();
  chartInst['all-trend']=new Chart(document.getElementById('all-trend-chart'),{type:'bar',data:{labels:OPS_NAMES,datasets:[{label:'Attendance %',data:OPS_NAMES.map(function(n){return port[n].mtd_pct;}),backgroundColor:OPS_NAMES.map(function(n){return gc(port[n].mtd_pct);}),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:60,max:100,ticks:{callback:function(v){return v+'%';},font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

function buildCompare(data) {
  var port = buildOpsPortfolio(data);
  var sorted = OPS_NAMES.slice().sort(function(a,b){return port[b].mtd_pct-port[a].mtd_pct;});
  document.getElementById('compare-cards').innerHTML = sorted.map(function(name){
    var o=port[name];
    return '<div class="cg"><div class="cg-name">'+name+'</div><div class="cg-big" style="color:'+gc(o.mtd_pct)+'">'+o.mtd_pct+'%</div><div class="cg-bar"><div class="cg-fill" style="width:'+o.mtd_pct+'%;background:'+gc(o.mtd_pct)+'"></div></div><div class="cg-breakdown"><div class="cg-b" style="background:#FCEBEB;color:#A32D2D">'+(o.zero+o.critical)+' critical</div><div class="cg-b" style="background:#FAEEDA;color:#854F0B">'+o.warning+' warning</div><div class="cg-b" style="background:#FFF9E6;color:#633806">'+o.watch+' watch</div><div class="cg-b" style="background:#EAF3DE;color:#3B6D11">'+o.good+' good</div></div></div>';
  }).join('');
  if(chartInst['stack'])chartInst['stack'].destroy();
  chartInst['stack']=new Chart(document.getElementById('stack-chart'),{type:'bar',data:{labels:sorted,datasets:[{label:'Zero/Critical',data:sorted.map(function(n){return port[n].zero+port[n].critical;}),backgroundColor:'#E24B4A',borderRadius:2},{label:'Warning',data:sorted.map(function(n){return port[n].warning;}),backgroundColor:'#EF9F27',borderRadius:2},{label:'Watch',data:sorted.map(function(n){return port[n].watch;}),backgroundColor:'#F9CB42',borderRadius:2},{label:'Good',data:sorted.map(function(n){return port[n].good;}),backgroundColor:'#639922',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:8}}},scales:{x:{stacked:true,ticks:{font:{size:11}},grid:{display:false}},y:{stacked:true,ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  var tableHTML='<table class="site-tbl"><thead><tr><th>Ops manager</th><th>Site name</th><th>%</th><th>Status</th><th>Action required</th></tr></thead><tbody>';
  sorted.forEach(function(name){
    var needsAction=port[name].sites.filter(function(s){return gst(s.pct)!=='good';}).sort(function(a,b){return a.pct-b.pct;});
    if(!needsAction.length) return;
    needsAction.forEach(function(s,i){
      var st=gst(s.pct),info=ACTIONS[st]||ACTIONS.watch;
      tableHTML+='<tr><td style="font-weight:700;white-space:nowrap">'+(i===0?name:'')+'</td><td style="max-width:220px;word-break:break-word;font-weight:500">'+s.site+'</td><td style="font-weight:800;color:'+gc(s.pct)+'">'+s.pct+'%</td><td><span class="badge '+bl(st)+'">'+sl(st)+'</span></td><td style="font-size:11px;color:#444">'+info.steps[0]+'</td></tr>';
    });
  });
  tableHTML+='</tbody></table>';
  document.getElementById('compare-table').innerHTML=tableHTML;
}

function showView(id, btn) {
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.nav-pill').forEach(function(b){b.classList.remove('active');});
  document.getElementById('v-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  else{var m={scorecard:0,league:1,compare:2};var pills=document.querySelectorAll('.nav-pill');if(pills[m[id]])pills[m[id]].classList.add('active');}
  if(id==='league'&&liveData) buildLeague(liveData);
  if(id==='compare'&&liveData) buildCompare(liveData);
}

setInterval(function(){ loadData(); }, AUTO_REFRESH_MINUTES * 60 * 1000);
window.onload = function(){ loadData(); };
</script>
